let audioPlayed = false;
const audioElement = new Audio('fail.mp3');

// Preload the audio
audioElement.preload = 'auto';
audioElement.load();

async function checkInternetConnection() {
    const netpopup = document.getElementById('no-connection-popup');
    
    try {
        // Attempt to fetch the first resource
        const response1 = await fetch('https://unpob.github.io/app/hack.jpg',{ method: 'HEAD', cache: 'no-store' });
        
        if (!response1.ok) {
            throw new Error('First link offline');
        }
        
        netpopup.style.display = 'none';
    } catch (error) {
        setTimeout(function() {
    window.history.back();
}, 500);
        netpopup.style.display = 'block';
        playAudioOnce();
      return;
    }
    // Reset the reload flag if connection is restored
    if (sessionStorage.getItem('reloaded') === 'true') {
        sessionStorage.removeItem('reloaded');
        location.reload();
    }
}

function playAudioOnce() {
    if (!audioPlayed) {
        audioElement.play().catch(error => {
            console.error('Audio playback failed:', error);
        });
        audioPlayed = true;
    }
}

window.addEventListener('load', checkInternetConnection);
setInterval(checkInternetConnection, 1000);
</script>
