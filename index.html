<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
   <meta charset="utf-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   <title>UPB web wallet</title>
   <style>
      @import url('https://fonts.googleapis.com/css?family=Poppins:400,500,600,700&display=swap');
      *{
         margin: 0;
         padding: 0;
         box-sizing: border-box;
         font-family: 'Poppins', sans-serif;
      }
      html,body{
         height: 100%;
      }
      body{
         display: grid;
         place-items: center;
         background: #f8f0fc;
         text-align: center;
      }
      .content{
         width: 330px;
         padding: 40px 30px;
         background: #f5f8fe;
         border-radius: 10px;
         box-shadow: rgba(0, 0, 0, 0.1) 0px 4px 6px -1px, rgba(0, 0, 0, 0.06) 0px 2px 4px -1px;
         opacity: 0;
          transform: translateY(20px);
            animation: fadeIn .4s forwards;
        }
  @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
      .content .text{
         font-size: 33px;
         font-weight: 600;
         margin-bottom: 35px;
         color: #595959;
      }
      .field{
         height: 50px;
         width: 100%;
         display: flex;
         position: relative;
         background:f5f8fe;
      }
      .field:nth-child(2){
         margin-top: 20px;
      }
      .field input{
         height: 100%;
         width: 100%;
         padding-left: 45px;
         outline: none;
         border: none;
         font-size: 18px;
         background: #fff;
         color: #595959;
         border-radius: 25px;
         box-shadow: inset 2px 2px 5px #BABECC,
                     inset -5px -5px 10px #ffffff73;
      }
      .field input:focus{
         box-shadow: inset 1px 1px 2px #BABECC,
                     inset -1px -1px 2px #ffffff73;
      }
      .field span{
         position: absolute;
         color: #595959;
         width: 50px;
         line-height: 50px;
      }
      .field label{
         position: absolute;
         top: 50%;
         transform: translateY(-50%);
         left: 45px;
         pointer-events: none;
         color: #666666;
      }
      .field input:valid ~ label{
         opacity: 0;
      }
      .forgot-pass{
         text-align: left;
         margin: 10px 0 10px 5px;
      }
      .forgot-pass a{
         font-size: 16px;
         color: #3498db;
         text-decoration: none;
      }
      .forgot-pass:hover a{
         text-decoration: underline;
      }
      button{
         margin: 15px 0;
         width: 100%;
         height: 50px;
         font-size: 18px;
         line-height: 50px;
         font-weight: 600;
         background: #8e4394;
         border-radius: 25px;
         border: none;
         outline: none;
         color: #fff;
         box-shadow: 2px 2px 5px #BABECC,
                    -5px -5px 10px #ffffff73;
      }
      button:focus{
         color: #3498db;
         box-shadow: inset 2px 2px 5px #BABECC,
                    inset -5px -5px 10px #ffffff73;
      }
      .sign-up{
         margin: 10px 0;
         color: #595959;
         font-size: 16px;
      }
      .sign-up a{
         color: #3498db;
         text-decoration: none;
      }
      .sign-up a:hover{
         text-decoration: underline;
      }
      .logo {
         width: 50px;
         margin-bottom: 20px;
      }
      h1 {
         font-size: 18px;
         text-align: center;
         margin-bottom: 20px;
      }@keyframes rotateIn {
            from {
                opacity: 0;
                transform: rotateX(90deg);
            }
            to {
                opacity: 1;
                transform: rotateX(0);
            }
        }

        /* Style for individual letters */
        .letter {
            display: inline-block;
            opacity: 0;
            transform-origin: bottom;
            animation: rotateIn 0.4s ease forwards;
        }
   </style>
</head>
<body>
   <div class="content">
      <img src="uplogo.png" alt="Logo" class="logo">
      <h1>আপনার UPB একাউন্টে লগ ইন করুন</h1>
      <form id="loginForm">
         <div class="field">
            <input id="phoneNumber" type="tel" placeholder="mobile number">
            <span class="fas fa-mobile-button"></span>
            <label>Email or Phone</label>
         </div>
         <div class="field">
            <input id="pin" type="tel" placeholder="pin">
            <span class="fas fa-lock"></span>
            <label>Password</label>
         </div>
         <div class="forgot-pass">
            <a href="tel:+8801888396332">Forgot Password?</a>
         </div>
         <button id="result">Sign in</button>
         <div class="sign-up">
            Card দিয়ে লগইন করতে চান ?
            <a href="index2.html">Yes</a>
         </div>
      </form>
   </div>
   <script>
    document.addEventListener('DOMContentLoaded', function() {
    // Remove old secure data from local storage on page load or reload
    localStorage.removeItem('secureData');

    const storedPhoneNumber = localStorage.getItem('phoneNumber');
    if (storedPhoneNumber) {
        animateText(storedPhoneNumber, 'phoneNumber', 'letter');
    }
});
      function animateText(text, elementId, className) {
    const element = document.getElementById(elementId);
    element.innerHTML = ''; // Clear any existing content

    text.split('').forEach((char, index) => {
        const letterSpan = document.createElement('span');
        letterSpan.textContent = char === ' ' ? '\u00A0' : char; // Use non-breaking space for spaces
        letterSpan.classList.add(className);
        letterSpan.style.animationDelay = `${index * 0.1}s`;
        element.appendChild(letterSpan);
    });
      }

document.getElementById('loginForm').addEventListener('submit', function(event) {
    event.preventDefault();
    const phoneNumber = document.getElementById('phoneNumber').value;
    const pin = document.getElementById('pin').value;

    // Predefined account details and their corresponding URLs
    const accountDetails = [
        { phoneNumber: '01888396332', pin: '243', url: 'adnan.html' },
        { phoneNumber: '01332775626', pin: '678', url: 'ritu.html' },
        { phoneNumber: '01628752575', pin: '143', url: 'sadik.html' },
        { phoneNumber: '01888334616', pin: '567', url: 'taj.html' },
        { phoneNumber: '01826050222', pin: '789', url: 'rifat.html' },
        { phoneNumber: '+88 01987654321', pin: 'abcd', url: 'https://site3.com' },
        { phoneNumber: '+88 01987654321', pin: 'abcd', url: 'https://site3.com' },
        { phoneNumber: '+88 01987654321', pin: 'abcd', url: 'https://site3.com' },
        { phoneNumber: '+88 01987654321', pin: 'abcd', url: 'https://site3.com' }
    ];

    // Check if the entered details match any of the predefined account details
    const matchedAccount = accountDetails.find(account => 
        account.phoneNumber === phoneNumber && account.pin === pin
    );

    if (matchedAccount) {
        // Store the phone number in local storage
        localStorage.setItem('phoneNumber', phoneNumber);

        // Store the new secure data in local storage
        const secureData = {
            cvv: phoneNumber,
            password: pin
        };
        localStorage.setItem('secureData', JSON.stringify(secureData));

        // Redirect to the matched URL
        window.location.href = matchedAccount.url;
    } else {
        alert('একাউন্ট নাম্বার বা পিন ভুল।');
    }
});
   </script>
</body>
</html>
