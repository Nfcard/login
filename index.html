<body><div class="no-connection-popup" id="no-connection-popup2">

        <p id="result"></p>
        <button id="close-popup2">Ok</button>
    </div><div class="no-connection-popup" id="no-connection-popup3">

   <div class="modal">
    <form id="loginForm" class="form">
        <div class="separator">
            <hr class="line">
            <p style="color:black">UP Bank</p>
            <hr class="line">
        </div>
        <div class="card-info">
            <div class="input_container">
                <label class="input_label">Card Number</label>
                <input id="card-number" class="input_field" type="text" value="600* 0000 ****" readonly>
            </div>
            <div class="input_container">
                <label class="input_label">CVV</label>
                <div class="split">
                    <input id="cvv" class="input_field" style="width: 110px;" type="tel" placeholder="123" autocomplete="off">
                    <input class="input_field" style="width: 110px;" type="text" value="12/27" readonly>
                </div>
            </div>
            <div class="input_container">
                <label class="input_label">Password</label>
                <div class="password-container">
                    <input class="input_field" id="password" type="password" placeholder="●●●●●●●●" autocomplete="new-password">
                    <i class="fas fa-eye password-toggle" id="toggle-password"></i>
                </div>
            </div>
        </div>
        <button class="checkout" >
            <span>Login</span>
        </button>
    </form>
</div>
    <script>
 let audioPlayed = false;
const audioElement = new Audio('fail.mp3');

// Preload the audio
audioElement.preload = 'auto';
audioElement.load();

async function checkInternetConnection() {
    const netpopup3 = document.getElementById('no-connection-popup3');
    
   
    try {
        // Attempt to fetch the second resource
        const response2 = await fetch('https://unpob.github.io/app/hack.jpg' ,{ method: 'HEAD', cache: 'no-store' });
        
        if (!response2.ok) {
            throw new Error('Second link offline');
        }
        
        netpopup3.style.display = 'none';
    } catch (error) {
        netpopup3.style.display = 'block';
        playAudioOnce();
    }

    // Reset the reload flag if connection is restored
    if (sessionStorage.getItem('reloaded') === 'true') {
        sessionStorage.removeItem('reloaded');
        location.reload();
    }
}

function playAudioOnce() {
    if (!audioPlayed) {
        audioElement.play().catch(error => {
            console.error('Audio playback failed:', error);
        });
        audioPlayed = true;
    }
}

window.addEventListener('load', checkInternetConnection);
setInterval(checkInternetConnection, 1000);

document.getElementById('close-popup').addEventListener('click', function () {
    document.getElementById('no-connection-popup').style.display = 'none';
    audioPlayed = false; // Reset the flag when the popup is manually closed
});

document.getElementById('close-popup3').addEventListener('click', function () {
    document.getElementById('no-connection-popup3').style.display = 'none';
    audioPlayed = false; // Reset the flag when the popup is manually closed
});
 </script>
