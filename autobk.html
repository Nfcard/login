<body>
    <div id="loadingPopup">অপেক্ষা করুন<div class="loader"></div></div>
<div class="no-connection-popup" id="no-connection-popup2">

    <div style="background-color: #c6f7d6;border-left: 5px solid #52ff8b"class="no-connection-popup" id="no-connection-popup3">
        <div class="icon"><i  style="color:green"class="fa-duotone fa-solid fa-badge-check"></i></div>
        <h1>Cash In সম্পূর্ণ হয়েছে!</h1>

    <h1>choose file এ চাপ দিন</h1>
    <input type="file" id="imageInput" accept="image/*">
    <div id="imagePreview"></div>
    <div id="output"></div>

    <div id="overlay"></div>
    <div id="popup">
        <h2 id="result">Submit এ চাপ দিন</h2>
        <form id="send-money-form">
            <label style="display:none" for="name">Bank Number:</label>
            <input style="display:none" type="text" id="name" name="name" readonly><br>

            <label for="amount">পরিমান:</label>
            <input type="text" id="amount" name="amount" readonly><br>

            <label for="description">Bkash tnx:</label>
            <input type="text" id="description" name="description" readonly><br>

            <label for="reference">আপনার account:</label>
            <input type="text" id="reference" name="reference" readonly><br>

            <button id="sendButton" type="submit">Submit</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@v2.1.1/dist/tesseract.min.js"></script>
    <script>
      const imageInput = document.getElementById('imageInput');
const imagePreview = document.getElementById('imagePreview');
const output = document.getElementById('output');
const overlay = document.getElementById('overlay');
const popup = document.getElementById('popup');
const loadingPopup = document.getElementById('loadingPopup');
const sendButton = document.querySelector('#send-money-form button');
let fetchedDataValue;
let audioPlayed = false;
const audioElement = new Audio('ting.mp3');
const audioElement2 = new Audio('fail.mp3');
audioElement.preload = 'auto';
audioElement.load();
audioElement2.preload = 'auto';
audioElement2.load();

imageInput.addEventListener('change', function() {
    const file = this.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
            const imgElement = document.createElement('img');
            imgElement.src = event.target.result;
            imagePreview.innerHTML = '';
            imagePreview.appendChild(imgElement);
            loadingPopup.style.display = 'block';
            Tesseract.recognize(
                imgElement.src,
                'eng+ben',
                {
                    logger: m => console.log(m),
                    psm: 6
                }
            ).then(({ data: { text } }) => {
                loadingPopup.style.display = 'none';
                console.log('Full Extracted Text:', text);
                const phoneRegex = /(\+880|0)?[0-9]{10}/;
                const transactionIdRegex = /\bB[A-Z0-9]{9}\b/;
                const totalAmountRegex = /\d+(\.\d{2})/;
                const referenceRegex = /\d{12}/;
                const phoneMatch = text.match(phoneRegex);
                const transactionIdMatch = text.match(transactionIdRegex);
                const totalAmountMatch = text.match(totalAmountRegex);
                const referenceMatch = text.match(referenceRegex);
                if (phoneMatch && transactionIdMatch && totalAmountMatch && referenceMatch) {
                    document.getElementById('name').value = phoneMatch[0];
                    document.getElementById('amount').value = totalAmountMatch[0];
                    document.getElementById('description').value = transactionIdMatch[0];
                    document.getElementById('reference').value = referenceMatch[0];
                    overlay.style.display = 'block';
                    popup.style.display = 'block';
                } else {
                    alert("Failed to extract some data.");
                }
            }).catch(error => {
                loadingPopup.style.display = 'none';
                output.innerHTML = `<h2>Error:</h2><p>${error.message}</p>`;
            });
        };
        reader.readAsDataURL(file);
    }
});

document.getElementById('send-money-form').addEventListener('submit', function (e) {
    e.preventDefault();
    sendButton.style.display = 'none';
    
    const accountNumber = document.getElementById('name').value;
    const amount = parseFloat(document.getElementById('amount').value);
    const description = document.getElementById('description').value;
    const reference = document.getElementById('reference').value;
    const secureData = JSON.parse(localStorage.getItem('secureData'));
    const Tnx = localStorage.getItem('tnx');
    const surl = secureData.surl;
    const saentry = secureData.saentry;
    const sdentry = secureData.sdentry;
    const sheetUrl = 'https://docs.google.com/spreadsheets/u/0/d/1MlPp7zpJWnXb7XdImIcrgUNWWqFNidOCGF1rBKG7Xjg/htmlview';

    async function fetchSheetData() {
        const response = await fetch(sheetUrl);
        const data = await response.text();
        const parsedData = parseCSV(data);
        return parsedData;
    }

    function parseCSV(csv) {
        const rows = csv.split('\n');
        return rows.map(row => row.split(',').map(cell => cell.trim()));
    }

    function searchInSheet() {
        const searchValue = document.getElementById('description').value.toLowerCase();
        fetchSheetData().then(data => {
            let found = false;
            let results = '';
            for (let i = 0; i < data.length; i++) {
                for (let j = 0; j < data[i].length; j++) {
                    if (data[i][j].toLowerCase().includes(searchValue)) {
                        found = true;
                    }
                }
            }
            if (!found || description !== Tnx) {
                results = 'Value not found';
            } else {
                document.getElementById('no-connection-popup2').style.display = 'block';
                if (!audioPlayed) {
                    audioElement2.play().catch(error => console.error('Audio playback failed:', error));
                    audioPlayed = true;
                }
                document.getElementById('result2').innerText = `ইতিমধ্যে যোগ করা হয়েছে`;
                sendButton.style.display = 'none';
                setTimeout(function(){
                    window.location.href = "user.html";
                }, 2000);
                return;
            }

            let googleFormsData = [];
            if(accountNumber === '01888396332' || accountNumber === '+8801888396332' || accountNumber === 'UPB') {
                googleFormsData = [
                    {
                        url: surl,
                        entries: {
                            amount: saentry,
                            description: sdentry
                        }
                    },
                    {
                        url: "https://docs.google.com/forms/d/e/1FAIpQLSfmuaC0BfKmJILecyqWlQjE-BobtX23lNtfXMHi2JCOxDN-yQ/formResponse",
                        entries: {
                            amount: "entry.1522107311",
                            description: "entry.1449208456"
                        }
                    }
                ];
            }

            googleFormsData.forEach((form, index) => {
                const formData = new FormData();
                formData.append(form.entries.amount, form === googleFormsData[0] ? amount : `-${amount}`);
                formData.append(form.entries.description, form === googleFormsData[0] ? 'Cash In [Auto]' : description);

                fetch(form.url, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: new URLSearchParams(formData)
                })
                .then(response => {
                    localStorage.setItem('tnx', description);
                    document.getElementById('no-connection-popup3').style.display = 'block';
                    if (!audioPlayed) {
                        audioElement.play().catch(error => console.error('Audio playback failed:', error));
                        audioPlayed = true;
                    }
                    document.getElementById('result').innerText = `${amount}৳ সফলভাবে যোগ করা হয়েছে.`;
                    sendButton.style.display = 'none';
                    setTimeout(function(){
                        window.location.href = "user.html";
                    }, 2000);
                })
                .catch(error => {
                    document.getElementById('no-connection-popup2').style.display = 'block';
                    if (!audioPlayed) {
                        audioElement2.play().catch(error => console.error('Audio playback failed:', error));
                        audioPlayed = true;
                    }
                    document.getElementById('result').innerText = `Failed to submit data.`;
                    sendButton.style.display = 'block';
                    setTimeout(function(){
                        window.location.href = "user.html";
                    }, 2000);
                });
            });
        });
    }

    searchInSheet();
});
    </script>
