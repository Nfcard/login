<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment</title>
  <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
* {
  box-sizing: border-box;
}

html, body {
  font-family: 'Montserrat', sans-serif;
  display: flex;
  width: 100%;
  height: auto;
  background: #fff;
  justify-content: center;
  align-items: center;
  margin: 0;
}

.checkout-panel {
  display: flex;
  flex-direction: column;
  width: 100%;
  height:100%;
  max-width: 940px;
  background-color: rgb(255, 255, 255);
  opacity:0;
  transform: translateY(20px);
  animation: fadeIn .5s forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.panel-body {
  padding: 20px;
  flex: 1;
}

.title {
  font-weight: 700;
  margin-top: 10px;
  margin-bottom: 20px;
  color: #2e2e2e;
  text-align: center;
}

.payment-method {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 20px;
}

.method {
  display: flex;
  flex-direction: column;
  width: 90%;
  max-width: 400px;
  height: auto;
  padding: 20px;
  border: 1px solid #ccc;
  border-radius: 10px;
  background-color: #fff;
  justify-content: center;
  align-items: center;
  margin: 10px 0;
  cursor: pointer;
  transition: border-color 0.3s ease;
}

.method.selected {
  border: 2px solid #1aad49;
}

.card-logos {
  display: flex;
  height: 40px;
  justify-content: space-between;
  align-items: center;
}

.card-logos img {
  margin:5px;
  max-width: 100%;
  max-height: 100%;
}

.radio-input {
  margin-top: 20px;
  text-align: center;
}

input[type='radio'] {
  display: none;
}

.panel-footer {
  display: flex;
  flex-direction: row;
  width: 100%;
  padding: 10px;
  background-color: rgb(239, 239, 239);
  justify-content: center;
  align-items: center;
  border-radius: 10px;
}

.panel-footer .btn {
  font-size: 16px;
  width: 100%;
  max-width: 200px;
  height: 48px;
  margin: 10px;
  transition: all .2s ease-in-out;
  letter-spacing: 1px;
  border: none;
  border-radius: 23px;
}

.back-btn {
  color: #f62f5e;
  background: #fff;
}

.next-btn {
  color: #fff;
  background: #f62f5e;
  font-weight:bold;
}

.btn:focus {
  outline: none;
}

.btn:hover {
  transform: scale(1.05);
}

@media (min-width: 768px) {
  .checkout-panel {
    width: 80%;
  }

  .payment-method {
    flex-direction: row;
    justify-content: space-between;
  }

  .method {
    margin: 0 10px;
  }

  .panel-footer {
    flex-direction: row;
    justify-content: space-between;
  }

  .panel-footer .btn {
    margin: 0;
  }
}
  </style>
</head>
<body>

  <div class="checkout-panel">
    <div class="panel-body">
      <h2 class="title">অর্থপ্রদানের পদ্ধতি নির্বাচন করুন</h2>

      <div class="payment-method">
        <label style="display:none" for="card" class="method card" onclick="selectMethod(this, 'upay')">
          <div class="card-logos">
            <img style="pointer-events: none" src="https://play-lh.googleusercontent.com/cCVvEEwDQSPmDO8F-kryWhvzy53JllG1FGtHGDG-SDgfVTvvYSvWEXXDbgAY0hf7Bg" alt="UPT Logo"/>
          </div>
          <div class="radio-input">
            <input id="card" type="radio" name="payment" value="upay">
            upay এর স্ক্রিনশট জমা দিন
          </div>
        </label>

        <label for="Bkash" class="method paypal" onclick="selectMethod(this, 'bkash')">
          <div class="card-logos">
            <img style="pointer-events: none" src="https://proyojoniobazar.github.io/shop/Bkash2.png" alt="Bkash Logo"/>
          </div>
          <div class="radio-input">
            <input id="Bkash" type="radio" name="payment" value="bkash">
            বিকাশের স্ক্রিনশট জমা দিন
          </div>
        </label>
      </div>

      <div class="panel-footer">
        <button style="text-decoration:none;color:black" class="btn back-btn" onclick="window.history.back()">Back</button>
        <button class="btn next-btn" onclick="redirectToLink()">Add Money</button>
      </div>
    </div>
  </div>

  <script>
    let selectedMethod = null;

    function selectMethod(element, method) {
      // Remove 'selected' class from all methods
      document.querySelectorAll('.method').forEach(function (el) {
        el.classList.remove('selected');
      });
      
      // Add 'selected' class to clicked method
      element.classList.add('selected');
      
      // Set selected method
      selectedMethod = method;
    }

    function redirectToLink() {
      if (selectedMethod === 'upay') {
        window.location.href = 'autoupay.html';
      } else if (selectedMethod === 'bkash') {
        window.location.href = 'autobk.html';
      } else {
        alert('Please select a payment method.');
      }
    }
  </script>

</body>
</html>
