 background: radial-gradient(circle at -8.9% 51.2%, rgb(255, 124, 0) 0%, rgb(255, 124, 0) 15.9%, rgb(255, 163, 77) 15.9%, rgb(255, 163, 77) 24.4%, rgb(19, 30, 37) 24.5%, rgb(19, 30, 37) 66%);

               .slideshow-container {

}

        .fade {

        .dashboard {

        .menu .menu-item {
            display: flex;
            flex-direction: row;
            align-items: center;
            font-size: 20px;
        }      

        .button-container {
            display: flex;
            gap: 10px;
            padding: 0;

            margin-left:-8px;

        .button {

          .popup {

      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      visibility: hidden;
      opacity: 0;
      z-index: 100;
      transition: visibility 0s, opacity 0.3s ease;
    }
    .popup.active {
      visibility: visible;
      opacity: 1;
    }
    .popup-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      width: 300px;
      position: relative;

    .popup-content img {

      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;

</head>
<body>
    <div class="container">

        <div class="menu">

    <script>
document.addEventListener("DOMContentLoaded", function() {
    function saveLink() {
      const sheetLink = 'https://docs.google.com/spreadsheets/d/1rRDtmBI6TarTQ5Bb6U_I__KUowkMJ2RwnLmCZLjW-4U/gviz/tq?gid=8875538'; // Replace gid with the actual sheet ID
      const surl = 'https://docs.google.com/forms/d/e/1FAIpQLScuAspEw6MJNhkI8tPYKCHZhRfS6F3n15EElqu73AzMqjBhSA/formResponse';
      const saentry = 'entry.1522107311';
      const sdentry = 'entry.1449208456';
      const tbl = 0;
      localStorage.setItem('tbl', tbl);
      localStorage.setItem('surl', surl);
      localStorage.setItem('saentry', saentry);
      localStorage.setItem('sdentry', sdentry);
      localStorage.setItem('historylink', sheetLink);
    }
            function fetchData1() {
                var url = 'https://docs.google.com/spreadsheets/u/0/d/1rRDtmBI6TarTQ5Bb6U_I__KUowkMJ2RwnLmCZLjW-4U/htmlview';
                fetch(url)
                    .then(response => response.text())
                    .then(data => {
                        var parser = new DOMParser();
                        var htmlDoc = parser.parseFromString(data, 'text/html');
                        var cellElement = htmlDoc.querySelectorAll('table')[1].rows[3].cells[2];
                        
                        var cellText = cellElement.innerText || cellElement.textContent;
                        document.getElementById('balance1').innerText = cellText.trim();
                    })
                    .catch(error => console.error('Error fetching data:', error));
            }

            function fetchData3() {
                var url = 'https://docs.google.com/spreadsheets/u/0/d/1rRDtmBI6TarTQ5Bb6U_I__KUowkMJ2RwnLmCZLjW-4U/htmlview';
                fetch(url)
                    .then(response => response.text())
                    .then(data => {
                        var parser = new DOMParser();
                        var htmlDoc = parser.parseFromString(data, 'text/html');
                        var cellElement = htmlDoc.querySelectorAll('table')[1].rows[3].cells[3];
                        
                        var cellText = cellElement.innerText || cellElement.textContent;
                        document.getElementById('balance2').innerText = cellText.trim();
                    })
                    .catch(error => console.error('Error fetching data:', error));
            }function fetchData2() {
                var url = 'https://docs.google.com/spreadsheets/u/0/d/1rRDtmBI6TarTQ5Bb6U_I__KUowkMJ2RwnLmCZLjW-4U/htmlview';
                fetch(url)
                    .then(response => response.text())
                    .then(data => {
                        var parser = new DOMParser();
                        var htmlDoc = parser.parseFromString(data, 'text/html');
                        var cellElement = htmlDoc.querySelectorAll('table')[1].rows[3].cells[4];
                        
                        var cellText = cellElement.innerText || cellElement.textContent;
                        document.getElementById('balance3').innerText = cellText.trim();
                    })
                    .catch(error => console.error('Error fetching data:', error));
            }function fetchData4() {
                var url = 'https://docs.google.com/spreadsheets/d/1VvKwtRmRSLy-eLCQfeCDeN6xT_vv-Gw5CsXbjcwcpxw/htmlview';
                fetch(url)
                    .then(response => response.text())
                    .then(data => {
                        var parser = new DOMParser();
                        var htmlDoc = parser.parseFromString(data, 'text/html');
                        var cellElement = htmlDoc.querySelectorAll('table')[0].rows[1].cells[10];
                        
                        var cellText = cellElement.innerText || cellElement.textContent;
                        document.getElementById('balance4').innerText = cellText.trim();
                    })
                    .catch(error => console.error('Error fetching data:', error));
            }

            saveLink();
            fetchData1();
            fetchData2();
  fetchData3();fetchData4();
  

            let slideIndex = 1;
            showSlides(slideIndex);

            function plusSlides(n) {
                showSlides(slideIndex += n);
            }

            function showSlides(n) {
                let i;
                let slides = document.getElementsByClassName("mySlides");
                if (n > slides.length) {slideIndex = 1}
                if (n < 1) {slideIndex = slides.length}
                for (i = 0; i < slides.length; i++) {
                    slides[i].style.display = "none"; 
                }
                slides[slideIndex-1].style.display = "block"; 
            }

            document.querySelector('.prev').addEventListener('click', function() {
                plusSlides(-1);
            });

            document.querySelector('.next').addEventListener('click', function() {
                plusSlides(1);
            });
        });      const sheetUrl = 'https://docs.google.com/spreadsheets/d/1VvKwtRmRSLy-eLCQfeCDeN6xT_vv-Gw5CsXbjcwcpxw/htmlview'; // Replace with your Google Sheets pubhtml link
    const cellKey = 'sheetCellValue';

    function showPopup() {
      document.getElementById('popup').classList.add('active');
    }

    function closePopup() {
      document.getElementById('popup').classList.remove('active');
      localStorage.setItem('popupShown', 'true');
    }

    async function checkForNotification() {
      try {
        const response = await axios.get(sheetUrl);
        const parser = new DOMParser();
        const doc = parser.parseFromString(response.data, 'text/html');
        const cellValue = doc.querySelector('table tbody tr:first-child td:nth-child(6)').innerText;

        const storedValue = localStorage.getItem(cellKey);

        // Check if the cell value has changed
        if (cellValue !== storedValue) {
          // Store the new cell value
          localStorage.setItem(cellKey, cellValue);
          // Reset the popup shown status
          localStorage.removeItem('popupShown');
        }

        // Show the popup if not already dismissed
        if (localStorage.getItem('popupShown') !== 'true') {
          showPopup();
        }
      } catch (error) {
        console.error('Error fetching data from Google Sheets:', error);
      }
    }
   
       window.onload = function() {
      checkForNotification();
    };
    function takeData() {
    const secureData = JSON.parse(localStorage.getItem('secureData'));
    if (secureData) {
        document.getElementById('username').innerText = secureData.cvv;
        document.getElementById('password').innerText = secureData.password;
    } else {
        window.location.href = 'index.html';
    }
}

window.onload = takeData;

       function clearData() {
            localStorage.removeItem('secureData');
            localStorage.removeItem('historylink');
            window.location.href = 'index.html';
        }

        document.getElementById('clearButton').addEventListener('click', clearData);
// Add a button or a link to trigger the data clearing
    </script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  
</body>
