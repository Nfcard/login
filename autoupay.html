    <script>
  function triggerShake() {
      const container = document.getElementById('send-money-form');
      let shakeInterval;
      let shakeTime = 0;
      
      // Function to create the soft left-right shake effect
      function shake() {
        const randomX = Math.floor(Math.random() * 6) - 3; // Small shake between -3px and 3px for X (left-right)
        
        container.style.transform = `translateX(${randomX}px)`; // Only translate along the X-axis
        
        shakeTime += 50; // Shake duration in milliseconds
        if (shakeTime >= 300) { // Shake for 300ms (for a smoother and shorter effect)
          clearInterval(shakeInterval);
          container.style.transform = ''; // Reset the transform property after the shake
        }
      }

      // Start shaking at 50ms intervals
      shakeInterval = setInterval(shake, 50);
    }

function preprocessImage(imageSrc) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.src = imageSrc;
    
    return new Promise((resolve, reject) => {
        img.onload = () => {
            canvas.width = img.width;
            canvas.height = img.height;
            // Draw the image on the canvas
            ctx.drawImage(img, 0, 0);
            
            // Convert to grayscale
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                // Apply grayscale formula
                const grayscale = r * 0.3 + g * 0.59 + b * 0.11;
                data[i] = data[i + 1] = data[i + 2] = grayscale;
            }
            ctx.putImageData(imageData, 0, 0);
            resolve(canvas.toDataURL()); // Return processed image as base64
        };
        img.onerror = reject;
    });
}

imageInput.addEventListener('change', function() {
    const file = this.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = async function(event) {
            const imgSrc = event.target.result;

            // Preprocess the image to improve OCR accuracy
            const processedImage = await preprocessImage(imgSrc);
            imagePreview.innerHTML = `<img src="${processedImage}" />`;
            loadingPopup.style.display = 'block';

            Tesseract.recognize(
                processedImage,
                'eng+ben',
                {
                    logger: m => console.log(m),
                    psm: 6,
                    tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789.,' // Allow alphanumeric + period/comma
                }
            ).then(({ data: { text } }) => {
                loadingPopup.style.display = 'none';
                console.log('Full Extracted Text:', text);

                // Clean the text: remove Bengali numbers and currency symbols
                let cleanText = text.replace(/[৳৮%¥]/g, ''); // Remove ৳ and ৮ from the text

                // Regular Expressions for data extraction
                const phoneRegex = /(\+880|0)?[0-9]{10}/;
                const transactionIdRegex = /\b[A-Z0-9]{10}\b/; // 10 character alphanumeric pattern
                const totalAmountRegex = /(?:\s|^)র?([0-9]+\.[0-9]{2})(?:\s|$)/; // Capture amount in the form of 10.00, avoiding any attached symbols
                const referenceRegex = /\d{12}/;

                // Extracted matches
                let phoneMatch = text.match(phoneRegex);
                let transactionIdMatch = text.match(transactionIdRegex);
                let totalAmountMatch = cleanText.match(totalAmountRegex); // Use cleaned text for amount
                let referenceMatch = text.match(referenceRegex);

                // Additional logic to handle when the amount has '1' incorrectly as the first character
                if (totalAmountMatch) {
                    let amount = totalAmountMatch[1]; // Capture the numeric part of the amount
                    
                    // Check if there are no currency symbols or specific characters in the original text before the amount
                    const symbolRegex = /[৳¥%৮]/;
                    const symbolMatch = text.match(symbolRegex);

                    // If no symbols are found and the amount starts with '1', remove the first '1'
                    if (symbolMatch && amount.startsWith('1') && amount.length > 1) {
                        amount = amount.slice(1);
                    }
                    
                    totalAmountMatch[1] = amount; // Update the amount after conditionally removing the leading '1'
                }

                if (phoneMatch && transactionIdMatch && totalAmountMatch && referenceMatch) {
                    document.getElementById('name').value = phoneMatch[0]; // Capture the phone number
                    document.getElementById('amount').value = totalAmountMatch[1]; // Capture the cleaned amount
                    document.getElementById('description').value = transactionIdMatch[0]; // Capture the transaction ID
                    document.getElementById('reference').value = referenceMatch[0]; // Capture the reference number
                    overlay.style.display = 'block';
                    popup.style.display = 'block';
                } else {
                    alert("দুঃখিত। সঠিক তথ্য নেই.");
                }

            }).catch(error => {
                loadingPopup.style.display = 'none';
                output.innerHTML = `<h2>Error:</h2><p>${error.message}</p>`;
            });
        };
        reader.readAsDataURL(file);
    }
});
